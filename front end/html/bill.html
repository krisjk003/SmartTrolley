<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartTrolley | Bill</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #000;
            padding: 40px;
        }

        .bill-container {
            max-width: 700px;
            margin: auto;
            border: 1px solid #ccc;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .meta {
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: #555;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #f4f4f4;
        }

        .total {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
        }

        .thank-you {
            text-align: center;
            margin-top: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="bill-container">
    <h1>SmartTrolley</h1>
    <div class="meta">
        Smart Retail Invoice<br>
        Generated Online
    </div>

    <table id="bill-table">
        <thead>
            <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Price (₹)</th>
            </tr>
        </thead>
        <tbody>
            <!-- Items inserted here -->
        </tbody>
    </table>

    <div class="total">
        Total Amount: ₹ <span id="bill-total">0</span>
        
    
</div>

<div class="fun-payment">
    <h3> Pay Directly to Developer</h3>
    <p>Scan this QR if you enjoyed SmartTrolley 😌</p>
    <img src="../assets/ambadi gpay.jpeg" alt="GPay QR" class="qr-image">



    </div>

    <div class="thank-you">
        Thank you for shopping with SmartTrolley 🙏
    </div>
</div>

<script>
   fetch("https://smarttrolley-backend.onrender.com/cart")
        .then(res => res.json())
        .then(cart => {

            const tbody = document.querySelector("#bill-table tbody");
            let total = 0;

            cart.forEach(item => {

                const gstAmount = (item.price * item.gst) / 100;
                const finalPrice = (item.price + gstAmount) * item.qty;

                total += finalPrice;

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td>${finalPrice.toFixed(2)}</td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById("bill-total").innerText = total.toFixed(2);

            // 🔥 CLEAR BACKEND AFTER BILL IS GENERATED
            return fetch("https://smarttrolley-backend.onrender.com/clear", {
                method: "POST"
            });

        })
        .then(() => {
            console.log("Cart cleared after billing");
        })
        .catch(err => console.error("Error:", err));
</script>


</body>
</html>
